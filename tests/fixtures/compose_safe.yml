version: "3.8"

services:
  db:
    image: postgres:15
    user: postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    networks:
      - backend

  web:
    image: myapp:latest
    user: appuser
    ports:
      - "8080:8080"
    networks:
      - backend

networks:
  backend:
    internal: true